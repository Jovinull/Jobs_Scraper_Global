services:
  prometheus:
    image: prom/prometheus
    container_name: vagas-prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    networks:
      - vagas-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: vagas-grafana
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - vagas-net
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    container_name: vagas-loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    networks:
      - vagas-net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    container_name: vagas-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_config:/etc/promtail
    networks:
      - vagas-net
    depends_on:
      - loki
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: vagas-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    networks:
      - vagas-net
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: vagas-redis-exporter
    environment:
      REDIS_ADDR: "valkey:6379"
    networks:
      - vagas-net
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter
    container_name: vagas-node-exporter
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - vagas-net
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor
    container_name: vagas-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - vagas-net
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager
    container_name: vagas-alertmanager
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - vagas-net
    restart: unless-stopped

volumes:
  grafana_data:
  loki_data:
  promtail_config:

networks:
  vagas-net:
    external: true