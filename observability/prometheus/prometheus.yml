global:
  scrape_interval: 60s
  evaluation_interval: 60s

scrape_configs:
  - job_name: backend
    static_configs:
      - targets: ["backend:3001"]

  - job_name: scraper-go
    static_configs:
      - targets: ["scraper-go:8081"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
